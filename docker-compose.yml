services:
  valkey:
    image: valkey/valkey:latest
    container_name: valkey_so1
    ports:
      - "6379:6379"
    networks:
      - monitoring_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_so1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitoring_net
    restart: unless-stopped

networks:
  monitoring_net:
    driver: bridge